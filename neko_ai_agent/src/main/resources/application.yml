spring:
  application:
    name: neko_ai_agent
  profiles:
    active: local
  # MCP 配置
  ai:
    mcp:
      client:
#        sse:
#          connections:
#            server1:
#              url: http://localhost:8127
        stdio:
          servers-configuration: classpath:mcp-servers.json
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never   # 不自动建表，手动管理表
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/neko_ai_agent
    username: root
    password: 19821220

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    # MyBatis 配置
    #true: 将下划线转变成驼峰式
    map-underscore-to-camel-case: false
    #仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  #配置全局配置
  global-config:
    db-config:
      #逻辑删除配置
      logic-delete-field: isDelete  #全局逻辑删除的实体字段名
      logic-delete-value: 1 #逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 #逻辑未删除值（默认为 0）
    enable-sql-runner: true

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.wenxi.neko_ai_agent.controller

# knife4j的增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    #org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug
    org.springframework.ai: debug

neko:
  rag:
    vector-store:
      # simple: 本地 JSON 文件向量库；pgvector: PostgreSQL + pgvector 向量库。
      type: simple
    pgvector:
      datasource:
        # 生产环境建议使用环境变量覆盖，不要提交真实密码。
        url: ${PGVECTOR_DATASOURCE_URL:jdbc:postgresql://localhost:5432/neko_vector}
        username: ${PGVECTOR_DATASOURCE_USERNAME:postgres}
        password: ${PGVECTOR_DATASOURCE_PASSWORD:postgres}
        maximum-pool-size: ${PGVECTOR_DATASOURCE_MAXIMUM_POOL_SIZE:5}
        minimum-idle: ${PGVECTOR_DATASOURCE_MINIMUM_IDLE:1}
        connection-timeout: ${PGVECTOR_DATASOURCE_CONNECTION_TIMEOUT:30000}
      schema-name: ${PGVECTOR_SCHEMA_NAME:public}
      dimensions: ${PGVECTOR_DIMENSIONS:1536}
      # 生产环境建议通过 SQL 迁移建表，避免应用多副本启动时抢建 schema。
      initialize-schema: ${PGVECTOR_INITIALIZE_SCHEMA:false}
      max-document-batch-size: ${PGVECTOR_MAX_DOCUMENT_BATCH_SIZE:10000}
      love-table-name: ${PGVECTOR_LOVE_TABLE_NAME:love_vector_store}
      pet-table-name: ${PGVECTOR_PET_TABLE_NAME:pet_vector_store}
    love-app:
      # 基础对话默认不强依赖向量检索，避免 Embedding 服务不可用时阻断聊天。
      enabled: true
    pet-app:
      # 宠物 RAG 默认关闭，避免后端启动时切分文档并调用 Embedding。
      enabled: true
      document-pattern: file:resource/documents/pet_app/*.md
      vector-store-file: tmp/vector_store/pet_app_vector_store.json
