spring:
  application:
    name: neko_ai_agent
  profiles:
    active: local
  # MCP 配置
  ai:
    mcp:
      client:
#        sse:
#          connections:
#            server1:
#              url: http://localhost:8127
        stdio:
          servers-configuration: classpath:mcp-servers.json
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never   # 不自动建表，手动管理表
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/neko_ai_agent
    username: root
    password: 19821220

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    # MyBatis 配置
    #true: 将下划线转变成驼峰式
    map-underscore-to-camel-case: false
    #仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  #配置全局配置
  global-config:
    db-config:
      #逻辑删除配置
      logic-delete-field: isDelete  #全局逻辑删除的实体字段名
      logic-delete-value: 1 #逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 #逻辑未删除值（默认为 0）
    enable-sql-runner: true

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.wenxi.neko_ai_agent.controller

# knife4j的增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    #org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug
    org.springframework.ai: debug
